<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDS的AI速报 - AI行业情报聚合</title>
    <meta name="description" content="GDS的AI速报：聚焦大模型前沿、实用Skills、算力动态、通用能力等AI前沿情报，每日更新。">
    <meta name="keywords" content="AI速报,大模型,Skills,Claude Code,算力,AI新闻,GDS">
    <meta property="og:title" content="GDS的AI速报">
    <meta property="og:description" content="聚焦大模型前沿、实用Skills、算力动态、通用能力等AI前沿情报。">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 首屏加载动画 */
        .card { opacity: 0; animation: fadeInUp 0.4s ease forwards; }
        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.10s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.20s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.30s; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--hero-bg);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 200;
        }
        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-to-top:hover { background: var(--accent); }

        /* 文章详情弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            max-width: 680px;
            width: 92%;
            max-height: 82vh;
            overflow-y: auto;
            padding: 32px 28px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transform: translateY(12px);
            transition: transform 0.25s;
        }
        .modal-overlay.open .modal {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94A3B8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: #F1F5F9;
            color: #334155;
        }
        .modal-tags { margin-bottom: 12px; }
        .modal-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 16px;
        }
        .modal-body {
            font-size: 0.95rem;
            color: #334155;
            line-height: 1.9;
            margin-bottom: 20px;
        }
        .modal-body p {
            margin-bottom: 14px;
        }
        .modal-meta {
            display: flex;
            gap: 16px;
            font-size: 0.82rem;
            color: #94A3B8;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: var(--hero-bg);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--accent); }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            background: #F1F5F9;
            color: #334155;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background: #E2E8F0; }
        .card { cursor: pointer; }
        .featured-card { cursor: pointer; }

        /* 商店卡片 */
        .shop-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .shop-card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            transform: translateY(-2px);
            border-color: #CBD5E1;
        }
        .shop-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .shop-card-body {
            padding: 16px;
        }
        .shop-card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.5;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .shop-card-summary {
            font-size: 0.8rem;
            color: var(--sub-text);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .shop-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-card-source {
            font-size: 0.72rem;
            color: var(--sub-text);
        }
        .shop-card-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            background: linear-gradient(135deg, #FF6B35, #FF5000);
            color: #fff;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .shop-card-link:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 12px rgba(255,80,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero -->
        <header class="hero">
            <h1 class="hero-title">GDS的AI速报</h1>
            <p class="hero-subtitle">聚焦大模型前沿 · 实用Skills · 算力动态 · 通用能力</p>
            <div class="hero-stats">
                <div class="hero-stat">
                    <div class="hero-stat-number" id="total-count">--</div>
                    <div class="hero-stat-label">收录文章</div>
                </div>
                <div class="hero-stat">
                    <div class="hero-stat-number">4</div>
                    <div class="hero-stat-label">内容分类</div>
                </div>
                <div class="hero-stat">
                    <div class="hero-stat-number" id="latest-date">--</div>
                    <div class="hero-stat-label">最新更新</div>
                </div>
            </div>
        </header>

        <!-- Category Tabs -->
        <nav class="tabs-wrapper">
            <div class="tabs">
                <button class="tab active" data-filter="all">
                    全部<span class="tab-count" id="count-all"></span>
                </button>
                <button class="tab" data-filter="model">
                    大模型前沿<span class="tab-count" id="count-model"></span>
                </button>
                <button class="tab" data-filter="skill">
                    实用Skills<span class="tab-count" id="count-skill"></span>
                </button>
                <button class="tab" data-filter="compute">
                    算力动态<span class="tab-count" id="count-compute"></span>
                </button>
                <button class="tab" data-filter="ocr">
                    通用能力<span class="tab-count" id="count-ocr"></span>
                </button>
                <button class="tab tab-subtle" data-filter="other">
                    其他<span class="tab-count" id="count-other"></span>
                </button>
            </div>
        </nav>

        <!-- Content -->
        <main class="content-area">
            <div class="waterfall-grid" id="article-grid">
                <!-- JS 动态渲染 -->
            </div>
            <div class="empty-state hidden" id="empty-state">
                <div class="empty-state-icon">📭</div>
                <div class="empty-state-text">暂无该分类的文章</div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div>GDS的AI速报 &copy; 2026</div>
            <div class="footer-links">
                <a href="#" onclick="alert('RSS功能即将上线')">RSS 订阅</a>
                <a href="https://github.com" target="_blank">GitHub</a>
            </div>
        </footer>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="back-to-top" title="回到顶部">↑</button>

    <!-- 文章详情弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-tags" id="modal-tags"></div>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-meta">
                <span id="modal-source"></span>
                <span id="modal-date"></span>
            </div>
            <div class="modal-actions">
                <a class="btn-primary" id="modal-link" target="_blank" rel="noopener">🔗 阅读原文</a>
                <button class="btn-secondary" id="modal-close-btn">关闭</button>
            </div>
        </div>
    </div>

    <script src="data/articles.js"></script>
    <script>
    (function() {
        // ====== 文章数据 ======
        let articles = [];

        // 从 JSON 文件加载
        async function loadArticles() {
            // 从 articles.js 加载（<script src> 在 file:// 和 http:// 下均可用）
            if (typeof EMBEDDED_ARTICLES !== 'undefined' && EMBEDDED_ARTICLES.length) {
                articles = EMBEDDED_ARTICLES;
            }
            // 尝试 fetch 获取可能更新的数据
            try {
                const resp = await fetch('data/articles.json?v=5');
                if (resp.ok) {
                    const fresh = await resp.json();
                    if (fresh.length) articles = fresh;
                }
            } catch(e) { /* 使用已加载的数据 */ }
            renderAll();
        }

        // ====== 渲染 ======
        let currentFilter = 'all';
        const grid = document.getElementById('article-grid');
        const emptyState = document.getElementById('empty-state');
        const TAG_NAMES = { model: '大模型前沿', skill: '实用Skills', compute: '算力动态', ocr: '通用能力', other: '其他' };
        const TAG_CLASSES = { model: 'model', skill: 'skill', compute: 'compute', ocr: 'ocr', other: 'other' };

        function renderAll() {
            const filtered = currentFilter === 'all'
                ? articles.filter(a => !a.tags.includes('other'))
                : articles.filter(a => a.tags.includes(currentFilter));

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                grid.innerHTML = filtered.map((a, idx) => {
                    const isFirst = idx === 0 && currentFilter === 'all';
                    if (a.featured && currentFilter === 'all') {
                        return renderFeatured(a);
                    }
                    return renderCard(a);
                }).join('');
            }

            // Update stats
            document.getElementById('total-count').textContent = articles.length;
            const dates = articles.map(a => a.date).sort().reverse();
            document.getElementById('latest-date').textContent = dates[0] || '--';

            // Update tab counts
            document.getElementById('count-all').textContent = `(${articles.length})`;
            document.getElementById('count-model').textContent = `(${articles.filter(a=>a.tags.includes('model')).length})`;
            document.getElementById('count-skill').textContent = `(${articles.filter(a=>a.tags.includes('skill')).length})`;
            document.getElementById('count-compute').textContent = `(${articles.filter(a=>a.tags.includes('compute')).length})`;
            document.getElementById('count-ocr').textContent = `(${articles.filter(a=>a.tags.includes('ocr')).length})`;
            document.getElementById('count-other').textContent = `(${articles.filter(a=>a.tags.includes('other')).length})`;
        }

        function renderCard(a) {
            if (a.cardStyle === 'shop') return renderShopCard(a);

            const tagsHTML = a.tags.map(t =>
                `<span class="card-tag ${TAG_CLASSES[t]}">${TAG_NAMES[t]}</span>`
            ).join('');

            return `
                <div class="card" data-id="${a.id}">
                    <div class="card-tags">${tagsHTML}</div>
                    <div class="card-title">${escapeHTML(a.title)}</div>
                    <div class="card-summary">${escapeHTML(a.summary)}</div>
                    <div class="card-footer">
                        <span class="card-source">${escapeHTML(a.source)}</span>
                        <span class="card-date">${a.date}</span>
                    </div>
                </div>
            `;
        }

        function renderShopCard(a) {
            const tagsHTML = a.tags.map(t =>
                `<span class="card-tag ${TAG_CLASSES[t]}">${TAG_NAMES[t]}</span>`
            ).join('');

            return `
                <div class="shop-card" data-id="${a.id}">
                    <img class="shop-card-img" src="${escapeHTML(a.image)}" alt="${escapeHTML(a.title)}" loading="lazy" onerror="this.style.display='none'">
                    <div class="shop-card-body">
                        <div class="card-tags" style="margin-bottom:6px">${tagsHTML}</div>
                        <div class="shop-card-title">${escapeHTML(a.title)}</div>
                        <div class="shop-card-summary">${escapeHTML(a.summary)}</div>
                        <div class="shop-card-footer">
                            <span class="shop-card-source">${escapeHTML(a.source)}</span>
                            <a class="shop-card-link" href="${escapeHTML(a.affiliateUrl || '#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🛒 去淘宝</a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFeatured(a) {
            const tagsHTML = a.tags.map(t =>
                `<span class="card-tag ${TAG_CLASSES[t]}">${TAG_NAMES[t]}</span>`
            ).join('');

            return `
                <div class="featured-card" data-id="${a.id}">
                    <div class="featured-label">🔥 头条</div>
                    <div class="card-tags" style="margin-bottom:8px">${tagsHTML}</div>
                    <div class="featured-title">${escapeHTML(a.title)}</div>
                    <div class="featured-summary">${escapeHTML(a.summary)}</div>
                    <div style="margin-top:12px;display:flex;justify-content:space-between;">
                        <span style="font-size:0.8rem;color:var(--sub-text)">${escapeHTML(a.source)}</span>
                        <span style="font-size:0.8rem;color:#94A3B8">${a.date}</span>
                    </div>
                </div>
            `;
        }

        function escapeHTML(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ====== 标签切换 ======
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderAll();
            });
        });

        // ====== 回到顶部按钮 ======
        const backToTop = document.getElementById('back-to-top');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 600) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });
        backToTop.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ====== 文章详情弹窗 ======
        const modalOverlay = document.getElementById('modal-overlay');
        const modal = document.getElementById('modal');

        function openModal(article) {
            document.getElementById('modal-tags').innerHTML = article.tags.map(t =>
                `<span class="card-tag ${TAG_CLASSES[t]}">${TAG_NAMES[t]}</span>`
            ).join('');
            document.getElementById('modal-title').textContent = article.title;

            // 渲染正文：按 \\n 换行分段
            const body = document.getElementById('modal-body');
            if (article.content) {
                const paragraphs = article.content.split('\n').filter(p => p.trim());
                body.innerHTML = paragraphs.map(p => `<p>${escapeHTML(p)}</p>`).join('');
            } else {
                body.innerHTML = `<p>${escapeHTML(article.summary)}</p>`;
            }

            document.getElementById('modal-source').textContent = '来源：' + article.source;
            document.getElementById('modal-date').textContent = article.date;
            const link = document.getElementById('modal-link');
            if (article.url && article.url !== '#') {
                link.href = article.url;
                link.textContent = '🔗 阅读原文';
                link.style.display = 'inline-flex';
            } else if (article.affiliateUrl && article.affiliateUrl !== '#') {
                link.href = article.affiliateUrl;
                link.textContent = '🛒 去淘宝逛逛';
                link.style.display = 'inline-flex';
            } else {
                link.style.display = 'none';
            }
            modalOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            modal.scrollTop = 0;
        }

        function closeModal() {
            modalOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });
        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
        });

        // 卡片点击事件委托
        grid.addEventListener('click', function(e) {
            const card = e.target.closest('.card, .featured-card, .shop-card');
            if (!card) return;
            // 如果点击的是链接，不打开弹窗
            if (e.target.closest('a')) return;
            const id = parseInt(card.dataset.id);
            const article = articles.find(a => a.id === id);
            if (article) openModal(article);
        });

        // ====== 启动 ======
        loadArticles();
    })();
    </script>
</body>
</html>
